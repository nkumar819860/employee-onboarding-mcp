# Employee Onboarding MCP Server Configuration
# Environment: Development/Production
env=development

# ================================================================
# MCP SERVER CONFIGURATION - AGENT FABRIC INTEGRATION
# ================================================================
mcp.server.name=employee-onboarding-mcp-server
mcp.server.version=3.0.0
mcp.server.description=MCP server for managing employee records and onboarding status. Handles employee creation, retrieval, status updates, and provides comprehensive employee management capabilities during the onboarding process.
mcp.server.baseUrl=http://localhost:8083/api
mcp.server.port=8083
mcp.server.host=0.0.0.0

# MCP Features
mcp.features.mock.enabled=true
mcp.features.database.required=false
mcp.features.audit.enabled=true

# ================================================================
# HTTP CONFIGURATION
# ================================================================
http.host=0.0.0.0
http.port=8081
https.port=8082

# ================================================================
# DATABASE CONFIGURATION
# ================================================================
db.strategy=h2
db.healthcheck.enabled=true
db.initialization.enabled=true

# H2 Database Configuration
db.h2.url=jdbc:h2:mem:employeedb
db.h2.driverClassName=org.h2.Driver
db.h2.username=sa
db.h2.password=
db.h2.maxPoolSize=10
db.h2.minPoolSize=1

# ================================================================
# MONITORING & OPERATIONS
# ================================================================
monitoring.metrics.enabled=true
cache.enabled=false

# ================================================================
# SECURITY CONFIGURATION
# ================================================================
security.enabled=false
security.oauth.enabled=false

# ================================================================
# LOGGING CONFIGURATION
# ================================================================
logging.level=INFO
logging.audit.enabled=true
