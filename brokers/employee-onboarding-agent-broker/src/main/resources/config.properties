# Employee Onboarding Agent Broker Configuration

# HTTP Server Configuration - BOTH ports required for CloudHub
http.host=0.0.0.0
http.port=8081
https.port=8082
# MCP Server Configuration
mcp.serverName=Employee Onboarding Agent Broker
mcp.serverVersion=1.0.0
mcp.serverDescription=Agent Broker MCP Server for Employee Onboarding Process Orchestration

# MCP Server Host Configuration (CloudHub)
employee.onboarding.mcp.host=employee-onboarding-mcp-server.us-e1.cloudhub.io
asset.allocation.mcp.host=assets-allocation-mcp-server.us-e1.cloudhub.io
notification.mcp.host=email-notification-mcp-server.us-e1.cloudhub.io

# MCP Server URL Configuration (for compatibility)
employee.onboarding.mcp.url=https://employee-onboarding-mcp-server.us-e1.cloudhub.io
asset.allocation.mcp.url=https://assets-allocation-mcp-server.us-e1.cloudhub.io
notification.mcp.url=https://email-notification-mcp-server.us-e1.cloudhub.io

# Local Development Overrides
employee.onboarding.mcp.host.local=localhost
asset.allocation.mcp.host.local=localhost
notification.mcp.host.local=localhost

employee.onboarding.mcp.port.local=8081
asset.allocation.mcp.port.local=8082
notification.mcp.port.local=8083

# MCP Network Configuration
mcp.request.timeout=30000
mcp.retry.maxAttempts=3
mcp.retry.delay=1000

mcp.server.url=https://employee-onboarding-agent-broker.us-e1.cloudhub.io
mcp.centralized.enabled=true

# Agent Broker Configuration
agent.broker.enabled=true
agent.broker.orchestration.enabled=true

# Groq LLM Configuration
groq.api.key=${env:GROQ_API_KEY}
groq.base.url=https://api.groq.com/openai/v1
groq.model=llama3-70b-8192
groq.timeout=30000

# MCP Streamable Endpoints Configuration
mcp.streamable.enabled=true
mcp.info.endpoint=/mcp/info
mcp.tools.endpoint=/mcp/tools

# Logging Configuration
logging.level.root=INFO
logging.level.com.mulesoft.mcp=DEBUG

# ==================================================================
# ANYPOINT PLATFORM AUTHENTICATION
# ==================================================================
# Connected App Credentials (loaded from .env)
connected.app.client.id=${env:CONNECTED_APP_CLIENT_ID}
connected.app.client.secret=${secure::connected.app.client.secret}

# Anypoint Platform User Credentials (fallback - loaded from .env)
anypoint.username=${env:ANYPOINT_USERNAME}
anypoint.password=${secure::anypoint.password}
